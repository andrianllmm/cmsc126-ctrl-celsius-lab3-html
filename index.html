<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A Website</title>
    <meta name="description" content="Short description of the website" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />

    <!-- Built-in dark mode support -->
    <meta name="color-scheme" content="light dark" />

    <!-- Styles -->
    <style>
      /* Use border-box everywhere so width/height include padding & border, making sizing predictable */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        line-height: 1.5;
        padding: 2rem;
        max-width: 900px;
        margin-inline: auto;
      }

      header,
      footer {
        margin-block: 2rem;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Hello!</h1>
    </header>

    <main>
      <p>Welcome to the website.</p>
    </main>

    <footer>
      <small>&copy; 2026</small>
    </footer>

    <!-- Scripts -->
    <script></script>
  </body>
</html>
