<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>A Website</title>
    <meta name="description" content="Short description of the website" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />

    <!-- Built-in dark mode support -->
    <meta name="color-scheme" content="light dark" />

    <!-- Styles -->
    <style>
      /* Use border-box everywhere so width/height include padding & border, making sizing predictable */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        line-height: 1.5;
        padding: 2rem;
        max-width: 900px;
        margin-inline: auto;
      }

      header,
      footer {
        margin-block: 2rem;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      nav div {
        display: flex;
        gap: 1rem;
      }

      nav a {
        text-decoration: none;
        color: inherit;
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="">WebsiteName</a>
      <div>
        <a href="/">Home</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/videos.html">Videos</a>
        <a href="/about.html">About</a>
      </div>
    </nav>

    <header>
      <h1>Videos</h1>
    </header>

    <main>
      <p>This is the main content of the page.</p>
    </main>

    <footer>
      <small>&copy; 2026</small>
    </footer>

    <!-- Scripts -->
    <script></script>
  </body>
</html>
